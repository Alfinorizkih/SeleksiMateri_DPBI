        { text: "Prinsip 'Gotong Royong' sebagai karakter bangsa Indonesia mengalami pergeseran di perkotaan. Pergeseran ini merupakan dampak dari...", options: ["Meningkatnya solidaritas mekanik masyarakat kota.", "Berkembangnya sikap individualisme dan profesionalisme berbasis orientasi ekonomi.", "Terlalu banyaknya festival budaya yang diselenggarakan pemerintah.", "Kurangnya pendidikan seni di sekolah-sekolah perkotaan."], correct: 1, img: null },

    // Helper acak pilihan jawaban (per soal)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    function preparePGShuffle(pgArr) {
        return pgArr.map(q => {
            const optCopy = [...q.options];
            const correctText = optCopy[q.correct];
            const shuffled = shuffleArray([...optCopy]);
            const newCorrect = shuffled.indexOf(correctText);
            return { ...q, options: shuffled, correct: newCorrect };
        });
    }
    function prepareMatchingShuffle() {
        return {
            leftItems: [...matchingLeft],
            rightOptions: shuffleArray([...matchingRightRaw]),
            correctMap: Object.fromEntries(matchingRightRaw.map(r => [r.matchTo, r.text]))
        };
    }

    function buildFixedQuestions() {
        const shuffledPg = preparePGShuffle(pgData);
        const shuffledTf = tfData.map(t => ({ ...t }));
        const matchingGroup = { type: "matching", data: prepareMatchingShuffle() };
        return [
            ...shuffledPg.map(p => ({ type: "pg", data: p })),
            ...shuffledTf.map(t => ({ type: "tf", data: t })),
            matchingGroup
        ];

                    <p style="margin:1rem 0;">Isi biodata Anda untuk bergabung dalam seleksi generasi emas bangsa.</p>
                    <div class="form-group"><label><i class="fas fa-sort-numeric-up"></i> Nomor Urut</label><input id="nomorUrut" placeholder="Contoh: 123-123"></div>
                    <div class="form-group"><label><i class="fas fa-user"></i> Nama Lengkap</label><input id="namaLengkap" placeholder="Nama sesuai Kartu Pelajar"></div>
                    <div class="form-group"><label><i class="fas fa-school"></i> Asal Sekolah</label><input id="asalSekolah" placeholder="Nama Sekolah"></div>
                    <button id="btnSiap" class="btn"><i class="fas fa-feather-alt"></i> Siap Mengikuti Seleksi</button>
                </div>
            </div>
            <footer>© 2026 Seleksi Duta Pelajar Berbudaya | <i class="fab fa-whatsapp"></i> <a href="#">+62 812-3456-7890</a></footer>
        `;
        const btn = document.getElementById("btnSiap");
        const inpNo = document.getElementById("nomorUrut"), inpNama = document.getElementById("namaLengkap"), inpSek = document.getElementById("asalSekolah");
        function validate() { btn.disabled = !(inpNo.value.trim() && inpNama.value.trim() && inpSek.value.trim()); btn.style.opacity = btn.disabled ? "0.6" : "1"; }
        inpNo.addEventListener("input", validate); inpNama.addEventListener("input", validate); inpSek.addEventListener("input", validate);
        validate();
        btn.addEventListener("click", () => {
            bioData = { nomorUrut: inpNo.value.trim(), nama: inpNama.value.trim(), asalSekolah: inpSek.value.trim() };
            currentPage = "confirmReg";
            render();
        });
    }

    function renderConfirmReg() {
        const greeting = getGreetingTime();
        root.innerHTML = `
            <div class="header"><h1><i class="fas fa-hand-sparkles"></i> Konfirmasi Seleksi</h1></div>
            <div class="main-content">
                <div class="card">
                    <div class="greeting">Selamat ${greeting}, ${bioData.nama} ✨</div>
                    <p>Hallo <strong>${bioData.nama}</strong>, selamat datang di Website Seleksi Duta Pelajar Berbudaya Indonesia.</p>
                    <div class="rules-box">
                        <strong><i class="fas fa-gavel"></i> 📜 Peraturan Seleksi:</strong>
                        <ol style="margin-top:8px;">
                            <li>Total 35 butir: 20 PG, 10 Benar/Salah, 1 sesi Menjodohkan (5 pasang).</li>
                            <li>Waktu: PG 20 detik, B/S 15 detik, Menjodohkan 50 detik per kelompok.</li>
                            <li>Setiap memilih jawaban akan tersimpan, lalu tunggu waktu habis untuk lanjut otomatis.</li>
                            <li>Tidak bisa kembali ke soal sebelumnya.</li>
                            <li>Layar penuh wajib, dilarang berpindah tab.</li>
                            <li>Jawaban tidak dipilih saat waktu habis = salah.</li>
                            <li>Jujur dan mandiri adalah kunci sukses.</li>
                            <li>Pastikan Biodata kamu sesuai dengan apa yang kamu daftarkan saat Pendaftaran!</li>
                        </ol>
                    </div>
                    <div class="timer-read" id="timerReadArea"><i class="fas fa-hourglass-half"></i> Baca peraturan: <span id="countdownRead">20</span> detik</div>
                    <button id="ikutQuizBtn" class="btn" disabled><i class="fas fa-play"></i> Ikut Kuis</button>
                </div>
            </div>
            <footer>© DPBI | Integritas Budaya</footer>
        `;
        let readSec = 20;
        const countSpan = document.getElementById("countdownRead");
        const btnIkut = document.getElementById("ikutQuizBtn");
        if (readTimerInterval) clearInterval(readTimerInterval);
        readTimerInterval = setInterval(() => {
            if (readSec <= 1) {
                clearInterval(readTimerInterval);
                btnIkut.disabled = false;
                btnIkut.style.background = "linear-gradient(95deg, #b8860b, #d4af37)";
                btnIkut.innerHTML = '<i class="fas fa-arrow-right"></i> Ikut Kuis Sekarang';
                document.getElementById("timerReadArea").innerHTML = '<i class="fas fa-check-circle"></i> Anda telah membaca peraturan, silakan lanjut.';
            } else {
                readSec--;
                countSpan.innerText = readSec;
            }
        }, 1000);
        btnIkut.addEventListener("click", () => {
            if (btnIkut.disabled) return;
            clearInterval(readTimerInterval);
            questionsSeq = buildFixedQuestions();
            userAnswers = new Array(questionsSeq.length).fill(null);
            for (let i=0; i<questionsSeq.length; i++) {
                if (questionsSeq[i].type === "matching") userAnswers[i] = { matches: {} };
                else userAnswers[i] = null;
            }
            currentIndex = 0;
            quizActive = true;
            currentPage = "quiz";
            document.documentElement.requestFullscreen().catch(e=>console.warn);
            attachAntiCheat();
            render();
            startTimerForCurrent();
        });
    }

    let fullHandler, visHandler;
    function attachAntiCheat() {
        const handleFull = () => { if (!document.fullscreenElement && currentPage==="quiz" && quizActive) alert("⚠️ Layar penuh diperlukan!"); };
        const handleVis = () => { if (document.hidden && currentPage==="quiz" && quizActive) alert("⚠️ Dilarang pindah tab!"); };
        document.addEventListener("fullscreenchange", handleFull);
        document.addEventListener("visibilitychange", handleVis);
        fullHandler=handleFull; visHandler=handleVis;
    }
    function detachAntiCheat() {
        if(fullHandler) document.removeEventListener("fullscreenchange", fullHandler);
        if(visHandler) document.removeEventListener("visibilitychange", visHandler);
        if(document.fullscreenElement) document.exitFullscreen();
    }

    function startTimerForCurrent() {
        stopTimer();
        const q = questionsSeq[currentIndex];
        let duration = 20;
        if (q.type === "pg") duration = 20;
        else if (q.type === "tf") duration = 15;
        else if (q.type === "matching") duration = 50;
        timeLeft = duration;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            if (!quizActive || currentPage !== "quiz") return;
            if (timeLeft <= 1) {
                stopTimer();
                autoSaveAnswer();
                goToNext();
            } else { timeLeft--; updateTimerDisplay(); }
        }, 1000);
    }
    function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
    function updateTimerDisplay() { const span=document.getElementById("liveTimer"); if(span) span.innerText=`${timeLeft} detik`; }
    function autoSaveAnswer() {
        const q = questionsSeq[currentIndex];
        if (q.type === "pg") {
            const sel = document.querySelector('input[name="pgOption"]:checked');
            userAnswers[currentIndex] = sel ? sel.value === "true" : (userAnswers[currentIndex] !== null ? userAnswers[currentIndex] : false);
        } else if (q.type === "tf") {
            const sel = document.querySelector('input[name="tfOption"]:checked');
            userAnswers[currentIndex] = sel ? sel.value === "true" : false;
        } else if (q.type === "matching") {
            const selects = document.querySelectorAll(".matching-select");
            if (selects.length && userAnswers[currentIndex]) {
                const lefts = q.data.leftItems;
                const curr = { ...userAnswers[currentIndex].matches };
                selects.forEach((sel,i) => { if(lefts[i]) curr[lefts[i]] = sel.value; });
                userAnswers[currentIndex] = { matches: curr };
            }
        }
    }
    function goToNext() {
        if (!quizActive) return;
        if (currentIndex + 1 < questionsSeq.length) {
            currentIndex++;
            render();
            startTimerForCurrent();
        } else {
            quizActive = false;
            stopTimer();
            showFinalConfirmPopup();
        }
    }

    function showFinalConfirmPopup() {
        const modal = document.createElement("div");
        modal.className = "modal-overlay";
        modal.innerHTML = `
            <div class="modal-card">
                <i class="fas fa-clipboard-list" style="font-size:2rem;color:#d4af37;"></i>
                <h3 style="margin:0.7rem 0;">Konfirmasi Seleksi</h3>
                <div class="checkbox-confirm">
                    <input type="checkbox" id="confirmChk">
                    <label for="confirmChk">Saya menyakini bahwa seleksi ini telah selesai, dan saya siap menerima nilai yang sesuai dengan kemampuan saya.</label>
                </div>
                <button id="finalConfirmBtn" class="btn" disabled>Konfirmasi Seleksi</button>
            </div>
        `;
        document.body.appendChild(modal);
        const chk = modal.querySelector("#confirmChk");
        const btnConf = modal.querySelector("#finalConfirmBtn");
        chk.addEventListener("change", (e) => { btnConf.disabled = !e.target.checked; if(e.target.checked) btnConf.style.background="linear-gradient(95deg, #b8860b, #d4af37)"; else btnConf.style.background="#7e6b3c"; });
        btnConf.addEventListener("click", async () => {
            if(btnConf.disabled) return;
            const { benar, salah, nilai } = computeFinalScore();
            finalScoreData = { benar, salah, nilai };
            modal.remove();
            currentPage = "final";
            render();
        });
    }

    function computeFinalScore() {
        let totalBenar=0, totalSoal=0;
        for(let idx=0; idx<questionsSeq.length; idx++) {
            const q=questionsSeq[idx];
            const ans=userAnswers[idx];
            if(q.type==="pg") { totalSoal++; if(ans===true) totalBenar++; }
            else if(q.type==="tf") { totalSoal++; if(ans===q.data.correct) totalBenar++; }
            else if(q.type==="matching") {
                const lefts=q.data.leftItems, saved=ans?.matches||{};
                let pair=0;
                lefts.forEach(term=>{ if(saved[term]===q.data.correctMap[term]) pair++; });
                totalBenar+=pair; totalSoal+=lefts.length;
            }
        }
        return { benar:totalBenar, salah:totalSoal-totalBenar, nilai:Math.round((totalBenar/totalSoal)*100) };
    }

    async function sendToTelegram(benar, salah, nilai, kritik="") {
        const waktu = new Date().toLocaleString('id-ID');
        let text = `📢 HASIL KUIS SELEKSI DUTA PELAJAR BERBUDAYA INDONESIA\n━━━━━━━━━━━━━━━━━━━━\n📋 DATA PESERTA\n🔢 Nomor Urut : ${bioData.nomorUrut}\n👤 Nama Lengkap : ${bioData.nama}\n🏫 Asal Sekolah : ${bioData.asalSekolah}\n━━━━━━━━━━━━━━━━━━━━\n📊 REKAP HASIL\n✅ Jumlah Benar : ${benar}\n❌ Jumlah Salah : ${salah}\n📈 Nilai Akhir : ${nilai}\n⏱ Waktu Pengiriman : ${waktu}`;
        if(kritik.trim()) text += `\n\n💬 KRITIK & SARAN untuk DPBI:\n${kritik}`;
        try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ chat_id:CHAT_ID, text:text }) }); } catch(e){}
    }

    function renderQuiz() {
        const q = questionsSeq[currentIndex];
        const total = questionsSeq.length;
        let html = `<div class="header"><h1><i class="fas fa-pen-fancy"></i> Seleksi DPBI</h1></div><div class="main-content"><div style="display:flex;justify-content:space-between;"><span>Soal ${currentIndex+1}/${total}</span><div class="quiz-timer"><i class="far fa-hourglass"></i> <span id="liveTimer">${timeLeft} detik</span></div></div>`;
        if (q.type === "pg") {
            const d = q.data;
            html += `<div class="question-text">${d.text}</div>${d.img?`<img src="${d.img}" class="quiz-image">`:''}<div class="option-list">`;
            d.options.forEach((opt, idx) => {
                const isChecked = (userAnswers[currentIndex] === (idx === d.correct)) ? 'checked' : '';
                html += `<label class="option-item"><input type="radio" name="pgOption" value="${idx === d.correct}" ${isChecked}> ${opt}</label>`;
            });
            html += `</div><div class="text-gold" style="font-size:0.8rem;">✓ Pilih jawaban, tunggu waktu habis otomatis lanjut.</div>`;
        } else if (q.type === "tf") {
            const d = q.data;
            html += `<div class="question-text">${d.text}</div><div class="option-list"><label class="option-item"><input type="radio" name="tfOption" value="true" ${userAnswers[currentIndex]===true?'checked':''}> ✅ Benar</label><label class="option-item"><input type="radio" name="tfOption" value="false" ${userAnswers[currentIndex]===false?'checked':''}> ❌ Salah</label></div>`;
        } else {
            const m = q.data;
            html += `<div class="question-text">🔗 MENJODOHKAN (5 pasang)</div><div class="matching-grid">`;
            const lefts = m.leftItems;
            const rightList = m.rightOptions;
            const saved = userAnswers[currentIndex]?.matches || {};
            for (let i=0;i<lefts.length;i++) {
                html += `<div class="matching-row"><span class="matching-term">📌 ${lefts[i]}</span><select class="matching-select" data-term="${lefts[i]}"><option value="">-- Pilih --</option>`;
                rightList.forEach(opt => {
                    html += `<option value="${opt.text.replace(/"/g,'&quot;')}" ${saved[lefts[i]]===opt.text ? 'selected' : ''}>${opt.text}</option>`;
                });
                html += `</select></div>`;
            }
            html += `</div><div class="text-gold">Pilih semua pasangan → simpan otomatis saat waktu habis.</div>`;
        }
        html += `</div><footer>© DPBI | Jaga Integritas</footer>`;
        root.innerHTML = html;
        if (q.type === "pg") {
            document.querySelectorAll('input[name="pgOption"]').forEach(r => r.addEventListener("change", (e) => { userAnswers[currentIndex] = e.target.value === "true"; }));
        } else if (q.type === "tf") {
            document.querySelectorAll('input[name="tfOption"]').forEach(r => r.addEventListener("change", (e) => { userAnswers[currentIndex] = e.target.value === "true"; }));
        } else if (q.type === "matching") {
            document.querySelectorAll(".matching-select").forEach(sel => sel.addEventListener("change", () => {
                if (!userAnswers[currentIndex]) userAnswers[currentIndex] = { matches: {} };
                const term = sel.getAttribute("data-term");
                userAnswers[currentIndex].matches[term] = sel.value;
            }));
        }
    }

    function renderFinal() {
        const motiv = (finalScoreData?.nilai>=80)?"Hebat! Pertahankan prestasimu!":(finalScoreData?.nilai>=60)?"Kerja Bagus! Terus belajar lagi ya.":"Tetap Semangat! Jangan menyerah.";
        root.innerHTML = `
            <div class="header"><h1><i class="fas fa-trophy"></i> Seleksi Selesai</h1></div>
            <div class="main-content">
                <div class="card" style="text-align:center;">
                    <i class="fas fa-star-of-life" style="font-size:2.5rem;color:#d4af37;"></i>
                    <div class="greeting">Hallo ${bioData.nama}, kamu telah menyelesaikan seleksi ini!</div>
                    <p><i class="fas fa-feather"></i> ${motiv}</p>
                    <div style="background:#fef3db; padding:0.8rem; border-radius:1rem; margin:1rem 0;">
                        📸 <strong>Silakan screenshot halaman ini</strong>, lalu upload story Instagram dan tag akun resmi kami <strong>@dutapelajarberbudaya</strong><br>
                        ✍️ Tulis kesan dan pesanmu!
                    </div>
                    <div class="form-group"><label><i class="fas fa-comment-dots"></i> Kritik & Saran untuk DPBI</label><textarea id="kritikSaran" rows="2" placeholder="Tulis kritik/saran untuk perkembangan DPBI..."></textarea></div>
                    <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-top:0.5rem;">
                        <button id="sendKritikBtn" class="btn" style="width:auto; flex:1;"><i class="fab fa-telegram"></i> Kirim & Selesai</button>
                        <button id="backHomeBtn" class="btn btn-secondary" style="width:auto; flex:1;"><i class="fas fa-home"></i> Kembali ke Beranda</button>
                    </div>
                </div>
            </div>
            <footer>© DPBI | Terima kasih telah berpartisipasi</footer>
        `;
        const sendBtn = document.getElementById("sendKritikBtn");
        const backBtn = document.getElementById("backHomeBtn");
        sendBtn.addEventListener("click", async () => {
            const kritik = document.getElementById("kritikSaran").value;
            await sendToTelegram(finalScoreData.benar, finalScoreData.salah, finalScoreData.nilai, kritik);
            alert("Terima kasih! Hasil dan saran telah terkirim ke panitia.");
            detachAntiCheat();
            currentPage = "home";
            render();
        });
        backBtn.addEventListener("click", () => {
            detachAntiCheat();
            currentPage = "home";
            render();
        });
    }

    render();
</script>
